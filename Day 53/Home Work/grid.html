<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid</title>
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
      padding: 5px;
      width: fit-content;
    }

    .grid div {
      background-color: #444;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 18px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <div class="grid">
    <div>D</div>
    <div>A</div>
    <div>F</div>
    <div>E</div>
    <div>B</div>
    <div>C</div>
  </div>

</body>
</html>
